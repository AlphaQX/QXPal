# QXPal PipeWire Audio stack overrides.
# Installs to /etc/pipewire/pipewire.conf.d/qxpal.conf or ~/.config/pipewire/pipewire.conf.d/qxpal.conf

context.properties = {
    # Force high-quality 48kHz sampling standard for laptop DAC output
    default.clock.rate          = 48000
    default.clock.allowed-rates = [ 44100 48000 96000 ]
    
    # Latency optimizations: Standardize latency buffer sizes
    default.clock.quantum       = 1024
    default.clock.min-quantum   = 128
    default.clock.max-quantum   = 2048
    
    # Real-time scheduling parameters to avoid CPU underruns (xruns)
    # under heavy desktop loads.
    cpu.rt.prio = 88
}
