# QXPal ALSA/Kernel Module Configuration
# Disables aggressive Intel/HDA hardware power saving to eliminate crackling/popping.
# Installs to /etc/modprobe.d/qxpal.conf

# Disable power saving on Intel HDA devices
options snd_hda_intel power_save=0 power_save_controller=N

# Disable power saving on AC97 devices (legacy fallback)
options snd_ac97_codec power_save=0
