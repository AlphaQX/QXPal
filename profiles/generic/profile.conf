# QXPal Generic Fallback Profile
# Works on any standard HDA Intel or USB audio codec.

PROFILE_NAME="Generic Speaker Profile"
ALSA_POWER_SAVE=0
EASYEFFECTS_PRESET="qxpal.json"

# Custom ALSA mixer commands for generic systems
apply_custom_alsa() {
    local card_idx="$1"
    log_info "Applying generic fallback mixer settings..."
    
    # Try to unmute Master and PCM controls and set them to comfortable levels (e.g. 90%)
    amixer -c "$card_idx" sset "Master" 90% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "PCM" 90% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "Speaker" 100% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "Headphone" 100% unmute 2>/dev/null || true
    
    # Turn off Auto-Mute if it disables speaker outputs incorrectly
    amixer -c "$card_idx" sset "Auto-Mute Mode" Disabled 2>/dev/null || true
}
