# QXPal HP Laptop Profile
# Configured for Spectre, Envy, EliteBook, and Omen series.

PROFILE_NAME="HP B&O Audio Optimizer"
ALSA_POWER_SAVE=0
EASYEFFECTS_PRESET="qxpal.json"

# Custom ALSA mixer commands for HP laptops
apply_custom_alsa() {
    local card_idx="$1"
    log_info "Applying HP specific audio/mixer tuning..."

    # Enable and unmute standard channels
    amixer -c "$card_idx" sset "Master" 95% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "PCM" 95% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "Speaker" 100% unmute 2>/dev/null || true
    
    # HP often has extra LFE (Low Frequency Effect) or Surround controls
    amixer -c "$card_idx" sset "LFE" 100% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "Surround" 100% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "Bass Speaker" 100% unmute 2>/dev/null || true
    
    # Disable auto-mute to avoid random dropouts
    amixer -c "$card_idx" sset "Auto-Mute Mode" Disabled 2>/dev/null || true
}
