# QXPal MSI Laptop Profile
# Tailored for MSI Gaming (GS/GE/GP/GL) and Creator/Prestige series.

PROFILE_NAME="MSI Nahimic Audio Optimizer"
ALSA_POWER_SAVE=0
EASYEFFECTS_PRESET="qxpal.json"

# Custom ALSA mixer commands for MSI laptops
apply_custom_alsa() {
    local card_idx="$1"
    log_info "Applying MSI specific audio/mixer tuning..."

    # Enable and unmute standard audio paths
    amixer -c "$card_idx" sset "Master" 95% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "PCM" 95% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "Speaker" 100% unmute 2>/dev/null || true
    
    # MSI laptops can have a dedicated Headphone or Front channel configuration
    amixer -c "$card_idx" sset "Front" 100% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "Headphone" 100% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "Auto-Mute Mode" Disabled 2>/dev/null || true
}
