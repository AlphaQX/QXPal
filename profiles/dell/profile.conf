# QXPal Dell Laptop Profile
# Tailored for XPS, Latitude, Inspiron, and Precision laptops.

PROFILE_NAME="Dell MaxxAudio Optimizer"
ALSA_POWER_SAVE=0
EASYEFFECTS_PRESET="qxpal.json"

# Custom ALSA mixer commands for Dell laptops
apply_custom_alsa() {
    local card_idx="$1"
    log_info "Applying Dell specific audio/mixer tuning..."

    # Enable and unmute standard audio paths
    amixer -c "$card_idx" sset "Master" 95% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "PCM" 95% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "Speaker" 100% unmute 2>/dev/null || true
    
    # Dell XPS series frequently use hidden digital gains or internal amplifiers
    amixer -c "$card_idx" sset "DAC" 100% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "Headphone" 100% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "Internal Mic Boost" 0dB 2>/dev/null || true
    
    # Disable auto-mute to avoid random dropouts on jack detection
    amixer -c "$card_idx" sset "Auto-Mute Mode" Disabled 2>/dev/null || true
}
