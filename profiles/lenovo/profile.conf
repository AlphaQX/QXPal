# QXPal Lenovo Laptop Profile
# Optimized for ThinkPads, Yoga, and Legion series.

PROFILE_NAME="Lenovo Speaker Optimizer"
ALSA_POWER_SAVE=0
EASYEFFECTS_PRESET="qxpal.json"

# Custom ALSA mixer commands for Lenovo laptops
apply_custom_alsa() {
    local card_idx="$1"
    log_info "Applying Lenovo specific audio/mixer tuning..."

    # Enable Master, PCM, and Speaker channels
    amixer -c "$card_idx" sset "Master" 95% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "PCM" 95% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "Speaker" 100% unmute 2>/dev/null || true
    
    # ThinkPads often have dual amp configs labeled "Bass Speaker" or "Speaker+"
    amixer -c "$card_idx" sset "Bass Speaker" 100% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "Bass" 100% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "Speaker+" 100% unmute 2>/dev/null || true
    
    # Disable auto-mute to avoid sudden drop-outs on some BIOS variants
    amixer -c "$card_idx" sset "Auto-Mute Mode" Disabled 2>/dev/null || true
}
