# QXPal ASUS Laptop Profile
# Tailored for ZenBook, ROG, TUF, and VivoBook laptops.

PROFILE_NAME="ASUS SonicMaster Optimizer"
ALSA_POWER_SAVE=0
EASYEFFECTS_PRESET="qxpal.json"

# Custom ALSA mixer commands for ASUS laptops
apply_custom_alsa() {
    local card_idx="$1"
    log_info "Applying ASUS specific audio/mixer tuning..."

    # Enable and unmute standard audio paths
    amixer -c "$card_idx" sset "Master" 95% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "PCM" 95% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "Speaker" 100% unmute 2>/dev/null || true
    
    # ASUS laptops with dual/quad speakers often label extra channels as "Center" or "LFE"
    amixer -c "$card_idx" sset "Center" 100% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "LFE" 100% unmute 2>/dev/null || true
    amixer -c "$card_idx" sset "Internal Amplifier" 100% unmute 2>/dev/null || true
    
    # Disable auto-mute to avoid random dropouts
    amixer -c "$card_idx" sset "Auto-Mute Mode" Disabled 2>/dev/null || true
}
